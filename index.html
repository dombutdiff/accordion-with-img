<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Services Accordion</title>
    <link rel="stylesheet" href="./styles.css">
</head>
<body>

    <div class="services-container">
        <h1 class="services-title">Services</h1>

        <div class="accordion-item">
            <button class="accordion-header" aria-expanded="false">
                <h2>Branding</h2>
                <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="12" y1="5" x2="12" y2="19"></line>
                    <polyline points="19 12 12 19 5 12"></polyline>
                </svg>
            </button>
            <div class="accordion-content">
                <ul class="accordion-body">
                    <li>Logo Design</li>
                    <li>Brand Guidelines</li>
                    <li>Collateral Design</li>
                    <li>Rebranding Services</li>
                </ul>
                <img src="./assets/1.avif" alt="">
            </div>
        </div>
        
        <div class="accordion-item">
            <button class="accordion-header" aria-expanded="false">
                <h2>Motion & Animation</h2>
                <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="12" y1="5" x2="12" y2="19"></line>
                    <polyline points="19 12 12 19 5 12"></polyline>
                </svg>
            </button>
            <div class="accordion-content">
                <ul class="accordion-body">
                    <li>Motion Graphics Design</li>
                    <li>Animated Explainer Videos</li>
                    <li>Interactive Presentations</li>
                </ul>
                <img src="./assets/2.avif" alt="">
            </div>
        </div>
        
        <div class="accordion-item">
            <button class="accordion-header" aria-expanded="false">
                <h2>Mobile</h2>
                <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="12" y1="5" x2="12" y2="19"></line>
                    <polyline points="19 12 12 19 5 12"></polyline>
                </svg>
            </button>
            <div class="accordion-content">
                <ul class="accordion-body">
                    <li>iOS App Development</li>
                    <li>Android App Development</li>
                    <li>App Prototyping and Testing</li>
                    <li>App Maintenance and Updates</li>
                </ul>
                <img src="./assets/3.avif" alt="">
            </div>
        </div>

    </div>

   <script src="./script.js"></script>
</body>
</html>
